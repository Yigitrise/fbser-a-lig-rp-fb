<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dosya Yükleme | Pisagor Projesi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .upload-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        p {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .file-input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }
        input[type="file"] {
            display: none;
        }
        .custom-file-upload {
            border: 2px dashed #3498db;
            display: inline-block;
            padding: 30px;
            cursor: pointer;
            width: 80%;
            border-radius: 8px;
            color: #3498db;
            transition: all 0.3s ease;
        }
        .custom-file-upload:hover {
            background-color: #ebf5fb;
            border-color: #2980b9;
        }
        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #27ae60;
        }
        #fileName {
            margin-top: 10px;
            display: block;
            color: #34495e;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="upload-container">
    <h2>Proje Dosyası Yükle</h2>
    <p>Lütfen "Pisagor Teoremi" sunum dosyanızı buraya yükleyin.</p>
    
    <div class="file-input-wrapper">
        <label for="file-upload" class="custom-file-upload">
            <i class="upload-icon">📁</i> Dosya Seçin
        </label>
        <input id="file-upload" type="file" onchange="showName()"/>
        <span id="fileName"></span>
    </div>

    <button onclick="uploadFile()">Yüklemeyi Başlat</button>
</div>

<script>
    function showName() {
        const input = document.getElementById('file-upload');
        const nameDisplay = document.getElementById('fileName');
        nameDisplay.textContent = input.files[0] ? input.files[0].name : "";
    }

    function uploadFile() {
        const input = document.getElementById('file-upload');
        if (input.files.length === 0) {
            alert("Lütfen önce bir dosya seçin!");
            return;
        }
        alert(input.files[0].name + " başarıyla seçildi! (Not: Bu bir arayüz taslağıdır, sunucu bağlantısı gerektirir.)");
    }
</script>

</body>
</html>
