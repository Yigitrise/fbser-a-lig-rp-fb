<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serie A - Transfermarkt Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --tm-blue: #002d62; --tm-bg: #f0f2f5; }
        body { font-family: 'Poppins', sans-serif; background: var(--tm-bg); margin: 0; padding: 15px; }
        .container { max-width: 1100px; margin: auto; }
        .back-btn { background: var(--tm-blue); color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; font-weight: 700; font-size: 13px; }
        .team-selector { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; overflow-x: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .team-opt { cursor: pointer; opacity: 0.5; transition: 0.3s; min-width: 50px; text-align: center; }
        .team-opt.active { opacity: 1; transform: scale(1.1); border-bottom: 3px solid var(--tm-blue); }
        .team-opt img { width: 45px; height: 45px; object-fit: contain; }
        .tm-header { background: white; padding: 25px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--tm-blue); }
        .tm-team-info { display: flex; align-items: center; gap: 20px; }
        .tm-big-logo { width: 90px; height: 90px; object-fit: contain; }
        .tm-team-name { font-size: 28px; font-weight: 800; color: var(--tm-blue); margin: 0; }
        .tm-value-card { background: var(--tm-blue); color: white; padding: 15px 30px; border-radius: 4px; text-align: right; }
        .tm-main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px; }
        .tm-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tm-card-title { background: #f8f9fb; padding: 15px; font-weight: 800; color: var(--tm-blue); border-bottom: 1px solid #eee; font-size: 14px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fb; color: #888; font-size: 11px; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        .player-img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; vertical-align: middle; margin-right: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div style="margin-bottom:20px;"><button onclick="window.location.href='index.html'" class="back-btn">← LİGE GERİ DÖN</button></div>
    <div class="team-selector" id="team-nav"></div>

    <div id="profile-content">
        <div class="tm-header">
            <div class="tm-team-info"><img id="tm-logo" src="" class="tm-big-logo"><div><h1 id="tm-name" class="tm-team-name">-</h1></div></div>
            <div class="tm-value-card"><div style="font-size: 11px; opacity: 0.7;">KADRO DEĞERİ</div><div style="font-size:26px; font-weight:800;" id="tm-total-val">€ 0.00m</div></div>
        </div>

        <div class="tm-main-grid">
            <div class="tm-card">
                <div class="tm-card-title">GÜNCEL KADRO</div>
                <table><thead><tr><th>OYUNCU</th><th style="text-align:center">YAŞ</th><th style="text-align:right">DEĞER</th></tr></thead><tbody id="squad-body"></tbody></table>
            </div>
            <div class="tm-card">
                <div class="tm-card-title" style="background:var(--tm-blue); color:white;">TEKNİK DİREKTÖR</div>
                <img id="tm-manager-img" src="" style="width:100%; height:auto;">
                <div style="padding:15px; text-align:center; font-weight:800; color:var(--tm-blue);" id="tm-manager-name">-</div>
            </div>
        </div>
    </div>
</div>

<script>
    let transData = {};
    let leagueData = {};

    async function yukle() {
        const [r1, r2] = await Promise.all([fetch('/api/transfer_veriler'), fetch('/api/veriler')]);
        transData = await r1.json();
        leagueData = await r2.json();
        const nav = document.getElementById('team-nav');
        Object.keys(transData.takimlar).forEach(name => {
            const div = document.createElement('div');
            div.className = 'team-opt';
            div.innerHTML = `<img src="${transData.takimlar[name].logo}">`;
            div.onclick = () => goster(name);
            nav.appendChild(div);
        });
        goster(Object.keys(transData.takimlar)[0]);
    }

    function goster(name) {
        const t = transData.takimlar[name];
        document.getElementById('tm-logo').src = t.logo;
        document.getElementById('tm-name').innerText = name;
        document.getElementById('tm-manager-name').innerText = t.hoca.isim;
        document.getElementById('tm-manager-img').src = t.hoca.foto;
        let totalVal = 0;
        document.getElementById('squad-body').innerHTML = t.kadro.map(p => {
            totalVal += parseFloat(p.deger);
            return `<tr><td><img src="${p.foto}" class="player-img"><b>${p.isim}</b></td><td style="text-align:center">${p.yas}</td><td style="text-align:right">€ ${p.deger}m</td></tr>`;
        }).join('');
        document.getElementById('tm-total-val').innerText = "€ " + totalVal.toFixed(2) + "m";
    }
    yukle();
</script>
</body>
</html>
