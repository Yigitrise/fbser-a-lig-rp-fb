<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serie A | Transfermarkt Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --tm-blue: #002d62; --tm-light: #f0f2f5; }
        body { font-family: 'Poppins', sans-serif; background: var(--tm-light); margin: 0; padding: 10px; }
        .container { max-width: 1000px; margin: auto; }
        .back-btn { background: var(--tm-blue); color: white; padding: 8px 15px; border-radius: 4px; text-decoration: none; font-weight: 700; font-size: 11px; }
        
        /* Takım Menüsü */
        .team-nav { background: white; padding: 15px; border-radius: 12px; display: flex; gap: 20px; overflow-x: auto; margin: 15px 0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .nav-item { cursor: pointer; opacity: 0.5; transition: 0.3s; min-width: 70px; text-align: center; }
        .nav-item.active { opacity: 1; transform: scale(1.1); border-bottom: 3px solid var(--tm-blue); }
        .nav-item img { width: 45px; height: 45px; object-fit: contain; display: block; margin: 0 auto; }
        .nav-item span { font-size: 10px; font-weight: 800; color: var(--tm-blue); display: block; margin-top: 5px; }

        /* Profil Header */
        .profile-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header { background: var(--tm-blue); color: white; padding: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .team-main { display: flex; align-items: center; gap: 20px; }
        .team-logo-big { width: 85px; height: 85px; object-fit: contain; background: white; border-radius: 8px; padding: 5px; }
        .team-name-big { font-size: 30px; font-weight: 800; margin: 0; }
        .market-val-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; border-left: 4px solid #fff; min-width: 150px; text-align: right; }

        /* Grid Layout */
        .grid { display: grid; grid-template-columns: 1.8fr 1fr; gap: 20px; padding: 20px; }
        @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }

        .card { background: white; border-radius: 10px; border: 1px solid #eee; overflow: hidden; }
        .card-header { padding: 12px 15px; font-weight: 800; color: var(--tm-blue); background: #f8f9fb; border-bottom: 1px solid #eee; font-size: 12px; }

        /* Tablo */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 15px; color: #888; font-size: 11px; background: #f8f9fb; }
        td { padding: 10px 15px; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
        .p-photo { width: 35px; height: 35px; border-radius: 4px; object-fit: cover; vertical-align: middle; margin-right: 10px; background: #eee; }
        .p-name { font-weight: 700; color: var(--tm-blue); }

        .manager-photo { width: 100%; height: 280px; object-fit: cover; }
        .manager-name { padding: 15px; text-align: center; font-weight: 800; color: var(--tm-blue); }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← LİG SAYFASI</a>
    
    <div class="team-nav" id="teamNav"></div>

    <div id="mainDisplay" class="profile-card">
        <div class="header">
            <div class="team-main">
                <img id="displayLogo" src="" class="team-logo-big" onerror="this.src='https://via.placeholder.com/100?text=Logo'">
                <div>
                    <h1 id="displayName" class="team-name-big">-</h1>
                    <div style="font-size:12px; opacity:0.8;">Italy Serie A Roleplay</div>
                </div>
            </div>
            <div class="market-val-box">
                <div style="font-size:10px; opacity:0.8; font-weight:700;">KADRO DEĞERİ</div>
                <div style="font-size:24px; font-weight:800;" id="displayTotal">€ 0.00m</div>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <div class="card-header">GÜNCEL OYUNCU KADROSU</div>
                <table id="squadTable">
                    <thead><tr><th>OYUNCU</th><th style="text-align:center">YAŞ</th><th style="text-align:right">DEĞER</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="card">
                <div class="card-header">TEKNİK DİREKTÖR</div>
                <img id="displayManagerPhoto" src="" class="manager-photo" onerror="this.src='https://tmssl.akamaized.net/images/portrait/header/default.jpg'">
                <div id="displayManagerName" class="manager-name">-</div>
            </div>
        </div>
    </div>
</div>

<script>
    let db = {};

    async function loadData() {
        try {
            const r = await fetch('transfer_verileri.json');
            if (!r.ok) throw new Error("Dosya yok!");
            db = await r.json();
            
            const nav = document.getElementById('teamNav');
            nav.innerHTML = '';
            
            Object.keys(db.takimlar).forEach((name, idx) => {
                const team = db.takimlar[name];
                const div = document.createElement('div');
                div.className = 'nav-item';
                div.id = `nav-${idx}`;
                div.innerHTML = `<img src="${team.logo}" onerror="this.src='https://via.placeholder.com/50'"><span style="text-transform:uppercase">${name}</span>`;
                div.onclick = () => showTeam(name, idx);
                nav.appendChild(div);
            });

            showTeam(Object.keys(db.takimlar)[0], 0);
        } catch (e) {
            console.error(e);
            document.body.innerHTML = "<h1 style='text-align:center; padding-top:100px;'>Hata: transfer_verileri.json bulunamadı!</h1>";
        }
    }

    function showTeam(name, idx) {
        const team = db.takimlar[name];
        
        // Menü Aktiflik
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(`nav-${idx}`).classList.add('active');

        // Header
        document.getElementById('displayLogo').src = team.logo;
        document.getElementById('displayName').innerText = name;
        document.getElementById('displayManagerName').innerText = team.hoca.isim;
        document.getElementById('displayManagerPhoto').src = team.hoca.foto;

        // Kadro
        let total = 0;
        const tbody = document.querySelector('#squadTable tbody');
        tbody.innerHTML = team.kadro.map(p => {
            total += parseFloat(p.deger) || 0;
            return `<tr>
                <td><img src="${p.foto}" class="p-photo" onerror="this.src='https://tmssl.akamaized.net/images/portrait/header/default.jpg'"><span class="p-name">${p.isim}</span></td>
                <td style="text-align:center; font-weight:600;">${p.yas}</td>
                <td style="text-align:right; font-weight:800; color:var(--tm-blue);">€ ${p.deger}m</td>
            </tr>`;
        }).join('');

        document.getElementById('displayTotal').innerText = "€ " + total.toFixed(2) + "m";
    }

    loadData();
</script>
</body>
</html>
