<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serie A League - Official RP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0a0a0a; color: white; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        h1 { text-align: center; color: #008CFF; font-weight: 800; text-transform: uppercase; margin-bottom: 30px; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn { padding: 12px 20px; background: #1a1a1a; border: 2px solid #333; color: #aaa; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .tab-btn.active { background: #008CFF; color: white; border-color: #008CFF; }
        .tab-content { display: none; background: #151515; padding: 25px; border-radius: 15px; border: 1px solid #222; }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
        th { color: #008CFF; font-size: 13px; }
        .team-logo { width: 25px; height: 25px; object-fit: contain; vertical-align: middle; margin-right: 10px; }
        .hafta-baslik { background: #222; padding: 10px; margin-top: 25px; border-radius: 5px; color: #008CFF; font-weight: bold; text-align: center; font-size: 14px; }
        .fixture-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #1a1a1a; }
        .fixture-team { flex: 1; font-weight: 500; }
        .score { background: #252525; padding: 4px 12px; border-radius: 4px; font-weight: bold; color: #008CFF; min-width: 40px; text-align: center; margin: 0 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🇮🇹 SERIE A LEAGUE</h1>
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('puan-durumu')">Puan Durumu</button>
        <button class="tab-btn" onclick="openTab('fikstur')">Fikstür / Son Maçlar</button>
        <button class="tab-btn" onclick="openTab('gol-kralligi')">Gol Krallığı</button>
        <button class="tab-btn" onclick="openTab('asist-kralligi')">Asist Krallığı</button>
    </div>

    <div id="puan-durumu" class="tab-content active">
        <table>
            <thead><tr><th>#</th><th>Takım</th><th>OM</th><th>G</th><th>B</th><th>M</th><th>AV</th><th>P</th></tr></thead>
            <tbody id="puan-table"></tbody>
        </table>
    </div>

    <div id="fikstur" class="tab-content">
        <div id="fixture-list"></div>
    </div>

    <div id="gol-kralligi" class="tab-content">
        <table>
            <thead><tr><th>#</th><th>Oyuncu</th><th>Takım</th><th>Gol</th></tr></thead>
            <tbody id="gol-table"></tbody>
        </table>
    </div>

    <div id="asist-kralligi" class="tab-content">
        <table>
            <thead><tr><th>#</th><th>Oyuncu</th><th>Takım</th><th>Asist</th></tr></thead>
            <tbody id="asist-table"></tbody>
        </table>
    </div>
</div>

<script>
    function openTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    async function verileriGetir() {
        const res = await fetch('/api/veriler');
        const data = await res.json();

        // Puan Durumu
        const siraliTakimlar = Object.entries(data.takimlar).sort((a,b) => b[1].puan - a[1].puan || (b[1].ag-b[1].yg) - (a[1].ag-a[1].yg));
        document.getElementById('puan-table').innerHTML = siraliTakimlar.map(([isim, t], i) => `
            <tr><td>${i+1}</td><td><img src="${t.logo}" class="team-logo">${isim}</td><td>${t.mac}</td><td>${t.g}</td><td>${t.b}</td><td>${t.m}</td><td>${t.ag-t.yg}</td><td style="font-weight:bold">${t.puan}</td></tr>
        `).join('');

        // Fikstür
        document.getElementById('fixture-list').innerHTML = data.fikstur.map(h => `
            <div class="hafta-baslik">${h.hafta}. HAFTA</div>
            ${h.maclar.map(m => `
                <div class="fixture-item">
                    <div class="fixture-team" style="text-align:right;">${m.ev}</div>
                    <div class="score">${m.skor}</div>
                    <div class="fixture-team" style="text-align:left;">${m.dep}</div>
                </div>
            `).join('')}
        `).join('');

        // Krallıklar
        document.getElementById('gol-table').innerHTML = data.golKralligi.map((o,i)=>`<tr><td>${i+1}</td><td>${o.oyuncu}</td><td>${o.takim}</td><td>${o.gol}</td></tr>`).join('');
        document.getElementById('asist-table').innerHTML = data.asistKralligi.map((o,i)=>`<tr><td>${i+1}</td><td>${o.oyuncu}</td><td>${o.takim}</td><td>${o.asist}</td></tr>`).join('');
    }
    verileriGetir();
</script>
</body>
</html>
