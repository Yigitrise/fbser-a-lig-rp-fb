<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serie A League - Official RP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0a0a0a; color: white; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        h1 { text-align: center; color: #008CFF; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; text-shadow: 0 0 10px rgba(0, 140, 255, 0.5); }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn { padding: 12px 20px; background: #1a1a1a; border: 2px solid #333; color: #aaa; cursor: pointer; border-radius: 8px; transition: 0.3s; font-weight: 600; }
        .tab-btn:hover { border-color: #008CFF; color: white; }
        .tab-btn.active { background: #008CFF; color: white; border-color: #008CFF; box-shadow: 0 0 15px rgba(0, 140, 255, 0.4); }
        .tab-content { display: none; background: #151515; padding: 25px; border-radius: 15px; border: 1px solid #222; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
        th { background: rgba(0, 140, 255, 0.1); color: #008CFF; font-size: 13px; text-transform: uppercase; }
        tr:hover { background: rgba(255,255,255,0.03); }
        .team-logo { width: 30px; height: 30px; object-fit: contain; vertical-align: middle; margin-right: 15px; }
        .rank { font-weight: bold; color: #008CFF; width: 40px; text-align: center; }
        .puan-bold { font-weight: 800; color: #fff; }
        .fixture-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #222; }
        .fixture-team { flex: 1; font-weight: 600; font-size: 16px; }
        .score { background: #333; padding: 5px 15px; border-radius: 5px; font-weight: 800; font-size: 18px; color: #008CFF; min-width: 50px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>🇮🇹 SERIE A LEAGUE</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('puan-durumu')">Puan Durumu</button>
        <button class="tab-btn" onclick="openTab('fikstur')">Son Maçlar / Fikstür</button>
        <button class="tab-btn" onclick="openTab('gol-kralligi')">Gol Krallığı</button>
        <button class="tab-btn" onclick="openTab('asist-kralligi')">Asist Krallığı</button>
    </div>

    <div id="puan-durumu" class="tab-content active">
        <table>
            <thead><tr><th>#</th><th>Takım</th><th>OM</th><th>G</th><th>B</th><th>M</th><th>AV</th><th>P</th></tr></thead>
            <tbody id="puan-table"></tbody>
        </table>
    </div>

    <div id="fikstur" class="tab-content">
        <div id="fixture-list">
            <p style="text-align:center; color:#666;">Henüz maç sonucu girilmedi.</p>
        </div>
    </div>

    <div id="gol-kralligi" class="tab-content">
        <table>
            <thead><tr><th>#</th><th>Oyuncu</th><th>Takım</th><th>Gol</th></tr></thead>
            <tbody id="gol-table"></tbody>
        </table>
    </div>

    <div id="asist-kralligi" class="tab-content">
        <table>
            <thead><tr><th>#</th><th>Oyuncu</th><th>Takım</th><th>Asist</th></tr></thead>
            <tbody id="asist-table"></tbody>
        </table>
    </div>
</div>

<script>
    function openTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    async function verileriGetir() {
        try {
            const res = await fetch('/api/veriler');
            const data = await res.json();

            // Puan Durumu
            const puanTable = document.getElementById('puan-table');
            const siraliTakimlar = Object.entries(data.takimlar || {}).sort((a, b) => b[1].puan - a[1].puan || (b[1].ag - b[1].yg) - (a[1].ag - a[1].yg));
            puanTable.innerHTML = siraliTakimlar.map(([isim, t], i) => `
                <tr>
                    <td class="rank">${i+1}</td>
                    <td><img src="${t.logo}" class="team-logo">${isim}</td>
                    <td>${t.mac}</td><td>${t.g}</td><td>${t.b}</td><td>${t.m}</td>
                    <td>${t.ag - t.yg}</td><td class="puan-bold">${t.puan}</td>
                </tr>
            `).join('');

            // Fikstür
            const fixtureList = document.getElementById('fixture-list');
            if (data.maclar && data.maclar.length > 0) {
                fixtureList.innerHTML = data.maclar.slice().reverse().map(m => `
                    <div class="fixture-item">
                        <div class="fixture-team" style="text-align:right;">${m.ev}</div>
                        <div class="score">${m.skor}</div>
                        <div class="fixture-team" style="text-align:left; margin-left:20px;">${m.dep}</div>
                    </div>
                `).join('');
            }

            // Gol Krallığı
            document.getElementById('gol-table').innerHTML = (data.golKralligi || []).sort((a,b)=>b.gol-a.gol).map((o,i)=>`
                <tr><td class="rank">${i+1}</td><td>${o.oyuncu}</td><td>${o.takim}</td><td class="puan-bold">${o.gol}</td></tr>
            `).join('');

            // Asist Krallığı
            document.getElementById('asist-table').innerHTML = (data.asistKralligi || []).sort((a,b)=>b.asist-a.asist).map((o,i)=>`
                <tr><td class="rank">${i+1}</td><td>${o.oyuncu}</td><td>${o.takim}</td><td class="puan-bold">${o.asist}</td></tr>
            `).join('');

        } catch (e) { console.error("Hata:", e); }
    }

    verileriGetir();
    setInterval(verileriGetir, 30000);
</script>
</body>
</html>
