<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serie A League - Official RP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0a0a0a; color: white; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        
        h1 { 
            text-align: center; 
            color: #008CFF; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0, 140, 255, 0.5);
        }
        
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .tab-btn { 
            padding: 12px 25px; 
            background: #1a1a1a; 
            border: 2px solid #333; 
            color: #aaa; 
            cursor: pointer; 
            border-radius: 8px; 
            transition: 0.3s;
            font-weight: 600;
        }
        .tab-btn:hover { border-color: #008CFF; color: white; }
        .tab-btn.active { background: #008CFF; color: white; border-color: #008CFF; box-shadow: 0 0 15px rgba(0, 140, 255, 0.4); }
        
        .tab-content { display: none; background: #151515; padding: 25px; border-radius: 15px; border: 1px solid #222; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
        th { background: rgba(0, 140, 255, 0.1); color: #008CFF; font-size: 14px; text-transform: uppercase; }
        tr:hover { background: rgba(255,255,255,0.03); }
        
        .team-logo { 
            width: 30px; 
            height: 30px; 
            object-fit: contain; 
            vertical-align: middle; 
            margin-right: 15px;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.1));
        }
        
        .rank { font-weight: bold; color: #008CFF; width: 40px; text-align: center; }
        .puan-bold { font-weight: 800; color: #fff; }

        /* Mobil Ayarı */
        @media (max-width: 600px) {
            .tab-btn { padding: 8px 15px; font-size: 12px; }
            th, td { padding: 10px 5px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🇮🇹 SERIE A LEAGUE</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('puan-durumu')">Puan Durumu</button>
        <button class="tab-btn" onclick="openTab('gol-kralligi')">Gol Krallığı</button>
        <button class="tab-btn" onclick="openTab('asist-kralligi')">Asist Krallığı</button>
    </div>

    <div id="puan-durumu" class="tab-content active">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Takım</th>
                    <th title="Oynanan Maç">OM</th>
                    <th>G</th>
                    <th>B</th>
                    <th>M</th>
                    <th>Puan</th>
                </tr>
            </thead>
            <tbody id="puan-table"></tbody>
        </table>
    </div>

    <div id="gol-kralligi" class="tab-content">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Oyuncu</th>
                    <th>Takım</th>
                    <th>Gol</th>
                </tr>
            </thead>
            <tbody id="gol-table"></tbody>
        </table>
    </div>

    <div id="asist-kralligi" class="tab-content">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Oyuncu</th>
                    <th>Takım</th>
                    <th>Asist</th>
                </tr>
            </thead>
            <tbody id="asist-table"></tbody>
        </table>
    </div>
</div>

<script>
    // Sekme Değiştirme Fonksiyonu
    function openTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // API'den Veri Çekme
    async function verileriGetir() {
        try {
            const res = await fetch('/api/veriler');
            const data = await res.json();

            // 1. Puan Durumu Yükleme
            const puanTable = document.getElementById('puan-table');
            const siraliTakimlar = Object.entries(data.takimlar || {}).sort((a, b) => b[1].puan - a[1].puan);
            puanTable.innerHTML = siraliTakimlar.map(([isim, t], i) => `
                <tr>
                    <td class="rank">${i+1}</td>
                    <td><img src="${t.logo}" class="team-logo"><span>${isim}</span></td>
                    <td>${t.mac || 0}</td>
                    <td>${t.g || 0}</td>
                    <td>${t.b || 0}</td>
                    <td>${t.m || 0}</td>
                    <td class="puan-bold">${t.puan || 0}</td>
                </tr>
            `).join('');

            // 2. Gol Krallığı Yükleme
            const golTable = document.getElementById('gol-table');
            const siraliGoller = (data.golKralligi || []).sort((a, b) => b.gol - a.gol);
            golTable.innerHTML = siraliGoller.map((o, i) => `
                <tr>
                    <td class="rank">${i+1}</td>
                    <td>${o.oyuncu}</td>
                    <td>${o.takim}</td>
                    <td class="puan-bold">${o.gol}</td>
                </tr>
            `).join('');

            // 3. Asist Krallığı Yükleme
            const asistTable = document.getElementById('asist-table');
            const siraliAsistler = (data.asistKralligi || []).sort((a, b) => b.asist - a.asist);
            asistTable.innerHTML = siraliAsistler.map((o, i) => `
                <tr>
                    <td class="rank">${i+1}</td>
                    <td>${o.oyuncu}</td>
                    <td>${o.takim}</td>
                    <td class="puan-bold">${o.asist}</td>
                </tr>
            `).join('');

        } catch (error) {
            console.error("Veri çekilirken hata oluştu:", error);
        }
    }

    // Sayfa açıldığında çalıştır
    verileriGetir();
    // 30 saniyede bir otomatik yenile
    setInterval(verileriGetir, 30000);
</script>

</body>
</html>
